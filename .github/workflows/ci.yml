name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate server syntax
        run: node --check server.js

      - name: Build Docker image
        run: docker build -t podcast-summary-web:${{ github.sha }} .
