<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Podcast Summary Login</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell auth-shell">
      <section class="panel auth-panel">
        <p class="eyebrow">Protected Access</p>
        <h1>Enter Password</h1>
        <p class="lede">輸入網站密碼後才能使用 podcast 分析工具。</p>

        <form id="login-form" class="form auth-form">
          <label>
            <span>Password</span>
            <input
              type="password"
              name="password"
              placeholder="輸入網站密碼"
              autocomplete="current-password"
              required
            />
          </label>

          <button type="submit" id="login-button">登入</button>
        </form>

        <div id="login-status" class="status" aria-live="polite"></div>
      </section>
    </main>

    <script src="/login.js"></script>
  </body>
</html>
